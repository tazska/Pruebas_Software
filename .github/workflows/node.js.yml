name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install backend dependencies
      run: npm ci
      working-directory: backend
    - name: Run backend tests
      run: npm test
      working-directory: backend

  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend
    - name: Lint
      run: npm run lint
      working-directory: frontend
    - name: Build
      run: npm run build
      working-directory: frontend

  k6:
    runs-on: ubuntu-latest
    needs: backend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install backend dependencies
      run: npm ci
      working-directory: backend
    - name: Install k6
      run: |
        curl -L -o k6.tar.gz https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz
        tar xzf k6.tar.gz
        sudo cp k6-v0.54.0-linux-amd64/k6 /usr/local/bin/
    - name: Start backend & run k6
      run: |
        node server.js &
        sleep 3
        k6 run ../k6-test.js
      working-directory: backend
